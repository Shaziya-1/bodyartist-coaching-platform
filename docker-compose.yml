version: '3.8'

services:
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: coach-athlete-pgbouncer
    ports:
      - "6432:6432"
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=urnoob
      - LISTEN_PORT=6432
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=session
      - MAX_CLIENT_CONN=100
      - DEFAULT_POOL_SIZE=20
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
